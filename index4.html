<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h2>Student Registration Form</h2>
    <form>
        Roll No:                   
        <input type="text"><br><br>
        Student Name:
        <input type="text" placeholder="First name">
        <input type="text" placeholder="Last name"><br><br>
        Father Name:
        <input type="text" placeholder="Father name"><br><br>
        Date Of Birth :
        <input type="text" placeholder="Day" size="2"> -
        <input type="text" placeholder="month" size="2" > -
        <input type="text" placeholder="year" size="4">
        (DD-MM-YYYY)
        <br><br>
        Mobile No :
        <input type="text" value="+91" size="2">
        <input type="text"><br><br>
        Email id:
        <input type="email"><br><br>
        Password:
        <input type="password" required minlength="8" maxlength="10"><br><br>
        Gender:
        <input type="radio" name="gender">
        Male
        <input type="radio" name="gender">
        Female
        <br><br>
       Department :
       <input type="checkbox">CSE
       <input type="checkbox">IT
       <input type="checkbox">ECE
       <input type="checkbox">Civil
       <input type="checkbox">Mech
       <br><br>

       Course:
       <select>
         <option>---Select current course---</option>
         <option>JAVA</option>
         <option>Html</option>
         <option>JavaScript</option>
       </select>
    </form>
</body>
</html>
