<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>

<body style="font-family: Arial; background-color: #f2f2f2;">

<div style="width:400px; margin:50px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px gray;">

    <h2 style="text-align:center;">Student Registration</h2>

    <form>

        <label>Full Name</label><br>
        <input type="text" placeholder="Enter your name" 
        style="width:100%; padding:8px; margin-top:5px;"><br><br>

        <label>Email</label><br>
        <input type="email" placeholder="Enter your email" 
        style="width:100%; padding:8px; margin-top:5px;"><br><br>

        <label>Phone Number</label><br>
        <input type="tel" placeholder="Enter phone number" 
        style="width:100%; padding:8px; margin-top:5px;"><br><br>

        <label>Date of Birth</label><br>
        <input type="date" 
        style="width:100%; padding:8px; margin-top:5px;"><br><br>

        <label>Gender</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <label>Course</label><br>
        <select style="width:100%; padding:8px; margin-top:5px;">
            <option>Select Course</option>
            <option>Java</option>
            <option>Python</option>
            <option>Web Development</option>
        </select><br><br>

        <label>Address</label><br>
        <textarea rows="3" 
        style="width:100%; padding:8px; margin-top:5px;"></textarea><br><br>

        <button type="submit" 
        style="width:100%; padding:10px; background-color:green; color:white; border:none; border-radius:4px;">
        Register
        </button>

    </form>

</div>

</body>
</html>
